<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Voidchain star system icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050c17"/>
      <stop offset="55%" stop-color="#091427"/>
      <stop offset="100%" stop-color="#140c22"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6be"/>
      <stop offset="45%" stop-color="#ffca72"/>
      <stop offset="100%" stop-color="#ff9b4d"/>
    </radialGradient>
    <radialGradient id="planetCore" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#b9ebff"/>
      <stop offset="100%" stop-color="#58a8ff"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="180" height="180" rx="38" fill="url(#bg)"/>

  <g opacity="0.32" fill="#d4e8ff">
    <circle cx="28" cy="34" r="1.6"/>
    <circle cx="48" cy="22" r="1.1"/>
    <circle cx="136" cy="32" r="1.4"/>
    <circle cx="152" cy="54" r="1.2"/>
    <circle cx="30" cy="142" r="1.2"/>
    <circle cx="52" cy="154" r="1.5"/>
    <circle cx="142" cy="140" r="1.3"/>
    <circle cx="118" cy="156" r="1.1"/>
  </g>

  <circle cx="90" cy="90" r="20" fill="url(#sun)" filter="url(#softGlow)" opacity="0.7"/>
  <circle cx="90" cy="90" r="16" fill="url(#sun)"/>

  <ellipse cx="90" cy="90" rx="54" ry="31" fill="none" stroke="#7ec7ff" stroke-width="4.2" opacity="0.78"/>
  <ellipse cx="90" cy="90" rx="72" ry="49" fill="none" stroke="#b98cff" stroke-width="3.6" opacity="0.42" transform="rotate(-28 90 90)"/>

  <g>
    <circle cx="141" cy="89" r="9" fill="url(#planetCore)"/>
    <circle cx="141" cy="89" r="14" fill="#58a8ff" opacity="0.14" filter="url(#softGlow)"/>
  </g>

  <g transform="rotate(-28 90 90)">
    <circle cx="162" cy="90" r="6.5" fill="#c59dff"/>
    <circle cx="162" cy="90" r="11" fill="#c59dff" opacity="0.14" filter="url(#softGlow)"/>
  </g>

  <path d="M46 118c8 8 20 13 33 15" fill="none" stroke="#d2f0ff" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
</svg>
